name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.9"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint — ruff check
        run: uv run ruff check .

      - name: Format — ruff format check
        run: uv run ruff format --check .

      - name: Type check — mypy
        shell: bash
        run: |
          if [ -d "phi_scan" ]; then
            uv run mypy phi_scan/
          else
            echo "phi_scan/ not yet created — skipping mypy"
          fi

      - name: Tests — pytest
        shell: bash
        run: |
          if [ -d "tests" ]; then
            uv run pytest tests/ -v --cov=phi_scan --cov-report=xml --cov-report=term-missing
          else
            echo "tests/ not yet created — skipping pytest"
          fi

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
