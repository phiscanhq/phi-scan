name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.9"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint — ruff check
        run: uv run ruff check .

      - name: Format — ruff format check
        run: uv run ruff format --check .

      - name: Type check — mypy
        continue-on-error: false
        run: uv run mypy phi_scan/

      - name: Tests — pytest
        continue-on-error: false
        run: uv run pytest tests/ -v --cov=phi_scan --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  dependency-audit:
    name: Dependency vulnerability audit (S9)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.9"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Run pip-audit with policy-enforced ignore list
        run: uv run --python 3.12 python .github/scripts/pip_audit_runner.py

  phi-scan:
    name: PHI/PII scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PHI scan configuration invariants
        shell: bash
        run: bash scripts/verify_phi_scan_config.sh

      - name: Scan for PHI/PII
        uses: joeyessak/phi-scan-action@b17418799d4cf730cf57676b49d4828a579930ed  # v0.1.0
        with:
          severity_threshold: medium
          diff_ref: ${{ github.event_name == 'pull_request' && 'origin/main' || '' }}
          post_comment: ${{ github.event_name == 'pull_request' }}
          upload_sarif: true
