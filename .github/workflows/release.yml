name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.9"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests before release
        run: uv run pytest tests/ -v --cov=phi_scan

      - name: Build sdist and wheel
        run: uv build

      - name: Smoke test built wheel
        run: |
          pip install dist/*.whl
          phi-scan --version
          phi-scan --help > /dev/null

      - name: Generate CycloneDX SBOM (S10)
        run: uv run --python 3.12 python .github/scripts/sbom_generator.py

      - name: Sign wheel and sdist with Sigstore (S11)
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: ./dist/*.whl ./dist/*.tar.gz

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish

      - name: Extract changelog for this release
        id: changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          printf '%s\n' "$RELEASE_NOTES" > /tmp/release-notes.md
          gh release create "$TAG_NAME" \
            --title "phi-scan $TAG_NAME" \
            --notes-file /tmp/release-notes.md \
            dist/*.whl \
            dist/*.tar.gz \
            dist/*.sigstore.json \
            sbom.cyclonedx.json
