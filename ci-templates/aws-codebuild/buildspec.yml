# phi-scan:ignore-file
# phi-scan AWS CodeBuild buildspec template
#
# Use this buildspec.yml in your CodeBuild project to scan for PHI/PII.
# Works with:
#   - CodePipeline orchestration (pass/fail gate between pipeline stages)
#   - GitHub and Bitbucket webhook-triggered builds
#   - Self-triggered builds via `aws codebuild start-build`
#
# Required environment variables (set in CodeBuild project → Environment):
#   GITHUB_TOKEN    — for GitHub PR comment posting (store in SSM or Secrets Manager)
#   BITBUCKET_TOKEN — for Bitbucket PR comment posting (store in SSM or Secrets Manager)
#
# Recommended: store tokens in AWS Secrets Manager and reference them as:
#   /CodeBuild/phi-scan/github-token  (SecretString)
#
# CodeBuild report group:
#   Create a report group named "phi-scan-findings" in your AWS account.
#   phi-scan uploads SARIF findings to this group — visible in CodeBuild Console → Reports.

version: 0.2

env:
  variables:
    PHI_SCAN_OUTPUT_DIR: "/tmp/phi-scan-results"
  # Uncomment and configure to pull tokens from SSM Parameter Store:
  # parameter-store:
  #   GITHUB_TOKEN: "/CodeBuild/phi-scan/github-token"
  #   BITBUCKET_TOKEN: "/CodeBuild/phi-scan/bitbucket-token"

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing phi-scan..."
      - pip install phi-scan
      - mkdir -p "$PHI_SCAN_OUTPUT_DIR"
      # Restore model cache from S3 (optional — remove if not using S3 cache)
      # - aws s3 sync s3://$PHI_SCAN_CACHE_BUCKET/.phi-scanner/ ~/.phi-scanner/ --quiet || true

  pre_build:
    commands:
      - echo "Detecting build context..."
      # Detect PR context from CodeBuild webhook trigger
      - |
        DIFF_FLAG=""
        COMMENT_FLAGS=""
        if echo "$CODEBUILD_WEBHOOK_TRIGGER" | grep -qE "^pr/[0-9]+$"; then
          PR_NUMBER=$(echo "$CODEBUILD_WEBHOOK_TRIGGER" | grep -oE '[0-9]+$')
          echo "PR build detected: #${PR_NUMBER}"
          DIFF_FLAG="--diff origin/${CODEBUILD_WEBHOOK_BASE_REF}"
          COMMENT_FLAGS="--post-comment --set-status"
        fi
        echo "export DIFF_FLAG='$DIFF_FLAG'" >> /tmp/phi-scan-env.sh
        echo "export COMMENT_FLAGS='$COMMENT_FLAGS'" >> /tmp/phi-scan-env.sh
        echo "export PR_NUMBER='${PR_NUMBER:-}'" >> /tmp/phi-scan-env.sh

  build:
    commands:
      - source /tmp/phi-scan-env.sh
      - echo "Running phi-scan..."
      # Use set +e so a non-zero exit (violations found) does not abort the phase.
      # The exit code is written to a file and read in post_build — this ensures the
      # SARIF file is fully written before CodeBuild uploads it to the report group.
      - |
        set +e
        phi-scan scan . \
          $DIFF_FLAG \
          --output sarif  --report-path "$PHI_SCAN_OUTPUT_DIR/phi-scan.sarif" \
          --output json   --report-path "$PHI_SCAN_OUTPUT_DIR/phi-scan.json"  \
          $COMMENT_FLAGS
        echo $? > /tmp/phi-scan-exit-code
        set -e
      - echo "phi-scan exit code: $(cat /tmp/phi-scan-exit-code)"

  post_build:
    commands:
      # Upload model cache to S3 (optional — remove if not using S3 cache)
      # - aws s3 sync ~/.phi-scanner/ s3://$PHI_SCAN_CACHE_BUCKET/.phi-scanner/ --quiet || true
      - echo "phi-scan scan complete."
      # Read the canonical exit code captured in the build phase and propagate it.
      # post_build always runs even when build fails — this guarantees the SARIF
      # report group upload completes before the build is marked failed.
      - |
        exit_code_file="/tmp/phi-scan-exit-code"
        if [ ! -f "$exit_code_file" ]; then
          echo "phi-scan: exit code file not found — scan may have failed." >&2
          exit 1
        fi
        phi_scan_exit_code=$(cat "$exit_code_file")
        if [ "$phi_scan_exit_code" -ne 0 ]; then
          python3 -c "
        import json, sys
        try:
            with open('$PHI_SCAN_OUTPUT_DIR/phi-scan.json') as fh:
                scan_report = json.load(fh)
            count = len(scan_report.get('findings', []))
            high = scan_report.get('severity_counts', {}).get('HIGH', 0)
            print(f'PHI/PII violations found: {count} ({high} HIGH)')
        except Exception as exc:
            print(f'Could not read phi-scan results: {exc}', file=sys.stderr)
            sys.exit(1)
          "
          exit "$phi_scan_exit_code"
        fi
        echo "phi-scan: no violations found."

reports:
  # CodeBuild report group — findings visible in AWS Console → CodeBuild → Reports
  phi-scan-findings:
    files:
      - "phi-scan.sarif"
    base-directory: "/tmp/phi-scan-results"
    file-format: SARIF
    discard-paths: false

artifacts:
  files:
    - "**/*"
  base-directory: "/tmp/phi-scan-results"
  name: phi-scan-results

cache:
  paths:
    # Cache pip packages across builds
    - "/root/.cache/pip/**/*"
    # Cache phi-scan models (spaCy, etc.)
    - "/root/.phi-scanner/**/*"
